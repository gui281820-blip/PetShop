<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Cabeçalho do site -->
    <header>
        <h1>PetShop Zona Sul</h1>
    </header>

    <!-- Menu de navegação -->
    <nav>
        <a href="index.html">Início</a>
        <a href="produtos.html">Produtos</a>
        <a href="servicos.html">Serviços</a>
        <a href="agendamento.html">Agendamento</a>
        <a href="contato.html">Contato</a>
    </nav>

    <main>
        <h2>Cadastro e Agendamento</h2>

        <form id="formAgendamento">

            <!-- Dados do cliente -->
            <h3>Dados do Cliente</h3>

            <label for="nomeCliente">Nome:</label>
            <input type="text" id="nomeCliente" class="form-control" placeholder="Digite seu nome" required>

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" class="form-control" placeholder="Digite seu endereço" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" class="form-control" placeholder="Digite seu CPF" required>

            <label>Sexo:</label><br>
            <input type="radio" name="sexo" value="Feminino"> Feminino
            <input type="radio" name="sexo" value="Masculino"> Masculino
            <input type="radio" name="sexo" value="Outro"> Outro

            <br><br>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" class="form-control" placeholder="Digite seu telefone" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required>

            <!-- Dados do pet -->
            <h3>Dados do Pet</h3>

            <label for="nomePet">Nome do Pet:</label>
            <input type="text" id="nomePet" class="form-control" placeholder="Digite o nome do pet" required>

            <label for="raca">Raça:</label>
            <input type="text" id="raca" class="form-control" placeholder="Digite a raça do pet" required>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" class="form-control" placeholder="Digite a idade do pet" required>

            <!-- Agendamento do serviço -->
            <h3>Serviço e Agendamento</h3>

            <label>Serviço desejado:</label><br>
            <input type="checkbox" name="servico" value="Banho"> Banho
            <input type="checkbox" name="servico" value="Tosa"> Tosa

            <br><br>

            <label>Método de atendimento:</label><br>
            <input type="radio" name="metodo" value="Tele-busca" required> Tele-busca
            <input type="radio" name="metodo" value="Entrega no local"> Entrega no local

            <br><br>

            <label for="data">Data do agendamento:</label>
            <input type="date" id="data" class="form-control" required>

            <label for="hora">Horário:</label>
            <input type="time" id="hora" class="form-control" required>

            <br>

            <button type="button" class="btn btn-primary" onclick="confirmarAgendamento()">
                Confirmar Agendamento
            </button>

        </form>

        <p id="mensagemAgendamento"></p>

    </main>

    <!-- Rodapé do site -->
    <footer>
        <p>© 2026 PetShop Zona Sul - Projeto Acadêmico</p>
    </footer>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
